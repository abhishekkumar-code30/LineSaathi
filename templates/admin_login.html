<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – LineSathi</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">LineSathi</div>
      <div class="subtitle">Admin Portal · Secure Access</div>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/admin">
        <label for="pw">Password</label>
        <input type="password" id="pw" name="password" placeholder="Enter admin password" autofocus />
        <button type="submit" class="btn-login">Login →</button>
      </form>
    </div>
    <a href="/" class="back-link">← Back to Dashboard</a>
  </div>
</body>

</html>
