<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – LineSaathi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: #080808;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px; opacity: 0.6;
    }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
    }

    .card {
      background: #161616;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 1.5rem;
      padding: 2.75rem 2.5rem;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    /* Top shimmer */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #F0C857 0%, #D4AF37 40%, #D4D4D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4b5563;
      margin-bottom: 2.5rem;
    }

    label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }

    input[type="password"] {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.1);
      color: #f0f0f0;
      border-radius: 0.75rem;
      padding: 0.9rem 1.1rem;
      width: 100%;
      font-size: 1rem;
      font-family: 'Instrument Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1.25rem;
    }
    input[type="password"]:focus {
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
    }
    input[type="password"]::placeholder { color: #374151; }

    .btn-login {
      display: block; width: 100%;
      background: linear-gradient(135deg, #A07D1C, #D4AF37);
      color: #080808;
      font-weight: 700;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.95rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(212,175,55,0.3);
      transition: opacity 0.2s, transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-login:hover  { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,175,55,0.45); }
    .btn-login:active { transform: translateY(0) scale(0.98); }

    .error-box {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      border-radius: 0.65rem;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .back-link {
      display: block; text-align: center; margin-top: 1.75rem;
      font-size: 0.82rem; color: #4b5563; text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #D4AF37; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">LineSaathi</div>
      <div class="subtitle">Admin Portal · Secure Access</div>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/admin">
        <label for="pw">Password</label>
        <input type="password" id="pw" name="password" placeholder="Enter admin password" autofocus />
        <button type="submit" class="btn-login">Login →</button>
      </form>
    </div>
    <a href="/" class="back-link">← Back to Dashboard</a>
  </div>
</body>
</html>
